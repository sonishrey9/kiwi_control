version: 2
surfaces:
  codex:
    file: AGENTS.md
    template: templates/project/AGENTS.md
    block_name: codex
  claude:
    file: CLAUDE.md
    template: templates/project/CLAUDE.md
    block_name: claude
  copilot:
    file: .github/copilot-instructions.md
    template: templates/project/.github/copilot-instructions.md
    block_name: copilot
portable_state:
  project: templates/project/.agent/project.yaml
  checks: templates/project/.agent/checks.yaml
  context:
    architecture: templates/project/.agent/context/architecture.md
    commands: templates/project/.agent/context/commands.md
    specialists: templates/project/.agent/context/specialists.md
    conventions: templates/project/.agent/context/conventions.md
    tool_capabilities: templates/project/.agent/context/tool-capabilities.md
    mcp_capabilities: templates/project/.agent/context/mcp-capabilities.md
    runbooks: templates/project/.agent/context/runbooks.md
  memory:
    repo_facts: templates/project/.agent/memory/repo-facts.json
    architecture_decisions: templates/project/.agent/memory/architecture-decisions.md
    domain_glossary: templates/project/.agent/memory/domain-glossary.md
    current_focus: templates/project/.agent/memory/current-focus.json
    open_risks: templates/project/.agent/memory/open-risks.json
    known_gotchas: templates/project/.agent/memory/known-gotchas.md
    last_successful_patterns: templates/project/.agent/memory/last-successful-patterns.md
  roles:
    readme: templates/project/.agent/roles/README.md
    specialist_template: templates/project/.agent/roles/specialist-role.md
  templates:
    role_result: templates/project/.agent/templates/role-result.md
  state:
    current_phase: templates/project/.agent/state/current-phase.json
    active_role_hints: templates/project/.agent/state/active-role-hints.json
    checkpoint_latest_json: templates/project/.agent/state/checkpoints/latest.json
    checkpoint_latest_markdown: templates/project/.agent/state/checkpoints/latest.md
    handoff_readme: templates/project/.agent/state/handoff/README.md
    dispatch_readme: templates/project/.agent/state/dispatch/README.md
    reconcile_readme: templates/project/.agent/state/reconcile/README.md
  scripts:
    verify_contract: templates/project/.agent/scripts/verify-contract.sh
  github:
    instructions:
      backend: templates/project/.github/instructions/backend.instructions.md
      frontend: templates/project/.github/instructions/frontend.instructions.md
      docs: templates/project/.github/instructions/docs.instructions.md
      data: templates/project/.github/instructions/data.instructions.md
    agents:
      shrey_junior: templates/project/.github/agents/shrey-junior.md
      specialist_template: templates/project/.github/agents/specialist-agent.md
    workflows:
      contract: templates/project/.github/workflows/shrey-junior-contract.yml
task_packets:
  directory: .agent/tasks
  roles:
    - planner
    - implementer
    - reviewer
    - tester
defaults:
  fallback_tool: codex
  planning_tool: claude
  review_tool: codex
  docs_tool: claude
  inline_tool: copilot
profiles:
  strict-production:
    description: Safety-first routing for shared production systems.
    default_execution_mode: guarded
    review_tool: codex
    sync:
      default_backup: true
    packet:
      medium_risk_required_roles:
        - reviewer
      high_risk_required_roles:
        - planner
        - reviewer
        - tester
    routing:
      task_types:
        planning: claude
        implementation: codex
        inline: copilot
        review: codex
        testing: codex
        docs: claude
        bugfix: codex
        refactor: codex
        migration: claude
        release-readiness: claude
      risk_overrides:
        high:
          review_tool: claude
          required_roles:
            - planner
            - reviewer
      file_area_overrides:
        docs: claude
        context: claude
        infra: codex
  product-build:
    description: Balanced defaults for active product development.
    default_execution_mode: assisted
    review_tool: codex
    sync:
      default_backup: false
    packet:
      medium_risk_required_roles:
        - reviewer
      high_risk_required_roles:
        - planner
        - reviewer
    routing:
      task_types:
        planning: claude
        implementation: codex
        inline: copilot
        review: codex
        testing: codex
        docs: claude
        bugfix: codex
        refactor: codex
        migration: claude
        release-readiness: claude
      risk_overrides:
        high:
          required_roles:
            - planner
            - reviewer
      file_area_overrides:
        docs: claude
        context: claude
  prototype:
    description: Fast iteration with lightweight review and inline edits.
    default_execution_mode: inline
    review_tool: codex
    sync:
      default_backup: false
    packet:
      medium_risk_required_roles:
        - reviewer
      high_risk_required_roles:
        - planner
        - reviewer
    routing:
      task_types:
        planning: claude
        implementation: codex
        inline: copilot
        review: codex
        testing: codex
        docs: copilot
        bugfix: codex
        refactor: codex
        migration: claude
        release-readiness: claude
      risk_overrides:
        high:
          required_roles:
            - planner
            - reviewer
      file_area_overrides:
        docs: copilot
  data-platform:
    description: Data and migration heavy repos with stronger planning defaults.
    default_execution_mode: assisted
    review_tool: claude
    sync:
      default_backup: true
    packet:
      medium_risk_required_roles:
        - reviewer
      high_risk_required_roles:
        - planner
        - reviewer
        - tester
    routing:
      task_types:
        planning: claude
        implementation: codex
        inline: copilot
        review: claude
        testing: codex
        docs: claude
        bugfix: codex
        refactor: codex
        migration: claude
        release-readiness: claude
      risk_overrides:
        high:
          review_tool: claude
          required_roles:
            - planner
            - reviewer
      file_area_overrides:
        data: codex
        docs: claude
  documentation-heavy:
    description: Docs, onboarding, and knowledge-heavy repositories.
    default_execution_mode: assisted
    review_tool: claude
    sync:
      default_backup: false
    packet:
      medium_risk_required_roles:
        - reviewer
      high_risk_required_roles:
        - planner
        - reviewer
    routing:
      task_types:
        planning: claude
        implementation: codex
        inline: copilot
        review: claude
        testing: codex
        docs: claude
        bugfix: codex
        refactor: claude
        migration: claude
        release-readiness: claude
      risk_overrides:
        high:
          review_tool: claude
          required_roles:
            - planner
            - reviewer
      file_area_overrides:
        docs: claude
        context: claude
