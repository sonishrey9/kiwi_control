<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiwi Control</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      html, body, #app {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1418;
        color: #eef2f6;
      }

      .kc-boot-fallback {
        box-sizing: border-box;
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .kc-boot-card {
        max-width: 720px;
        border: 1px solid #2f3942;
        border-radius: 16px;
        background: #151c22;
        padding: 24px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      }

      .kc-boot-card h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .kc-boot-card p,
      .kc-boot-card pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .kc-boot-card pre {
        margin-top: 12px;
        border-radius: 12px;
        background: #0f1418;
        padding: 16px;
        color: #f8d4d4;
      }

      #boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: #0f1418;
      }

      #boot-overlay.is-hidden {
        display: none;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CNEV6VFQ.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-LudhcVG3.css">
  </head>
  <body>
    <div id="boot-overlay">
      <div class="kc-boot-fallback">
        <div class="kc-boot-card">
          <h1>Loading Kiwi Control</h1>
          <p>If this screen does not change, the renderer failed before mount.</p>
        </div>
      </div>
    </div>
    <div id="app"></div>
  </body>
</html>
