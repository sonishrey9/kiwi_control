name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Run the full macOS/Windows/Linux desktop matrix"
        required: false
        default: false
        type: boolean

jobs:
  verify-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Remove macOS metadata junk
        run: node scripts/remove-macos-metadata.mjs .

      - name: Build workspace
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Smoke test
        run: bash scripts/smoke-test.sh

      - name: Verify Shrey Junior contract
        shell: bash
        run: |
          set -euo pipefail
          bash .agent/scripts/verify-contract.sh

  verify-cross-platform:
    if: github.event_name == 'workflow_dispatch' && inputs.full_matrix == true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Remove macOS metadata junk
        run: node scripts/remove-macos-metadata.mjs .

      - name: Build workspace
        run: npm run build

      - name: Build desktop bundle
        run: npm run ui:desktop:build

      - name: Verify default desktop CLI setup on macOS
        if: matrix.os == 'macos-latest'
        run: |
          npm run test:installer:bundled-cli:macos
          npm run test:installer:cli-enable:macos

      - name: Verify default desktop CLI setup on Windows
        if: matrix.os == 'windows-latest'
        run: |
          npm run test:installer:bundled-cli:windows
          npm run test:installer:cli-enable:windows

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: kiwi-control-desktop-${{ matrix.os }}
          path: apps/sj-ui/src-tauri/target/release/bundle
          if-no-files-found: ignore
