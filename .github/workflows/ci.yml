name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Run the full macOS/Windows/Linux desktop matrix"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          if command -v rustup >/dev/null 2>&1; then
            rustup toolchain install stable --profile minimal --no-self-update
            rustup default stable
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          cargo --version
          rustc --version

      - name: Install dependencies
        run: npm ci

      - name: Remove macOS metadata junk
        run: node scripts/remove-macos-metadata.mjs .

      - name: Build workspace
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Smoke test
        run: bash scripts/smoke-test.sh

  verify-cross-platform:
    if: github.event_name == 'workflow_dispatch' && inputs.full_matrix == true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          if command -v rustup >/dev/null 2>&1; then
            rustup toolchain install stable --profile minimal --no-self-update
            rustup default stable
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          cargo --version
          rustc --version

      - name: Install dependencies
        run: npm ci

      - name: Remove macOS metadata junk
        run: node scripts/remove-macos-metadata.mjs .

      - name: Build workspace
        run: npm run build

      - name: Build desktop bundle
        run: npm run ui:desktop:build

      - name: Verify default desktop CLI setup on macOS
        if: matrix.os == 'macos-latest'
        run: |
          npm run test:installer:bundled-cli:macos
          npm run test:installer:cli-enable:macos

      - name: Verify default desktop CLI setup on Windows
        if: matrix.os == 'windows-latest'
        run: |
          npm run test:installer:bundled-cli:windows
          npm run test:installer:cli-enable:windows

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kiwi-control-desktop-${{ matrix.os }}
          path: apps/sj-ui/src-tauri/target/release/bundle
          if-no-files-found: ignore
