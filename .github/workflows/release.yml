name: Release Prep

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux desktop prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Remove macOS metadata junk
        run: node scripts/remove-macos-metadata.mjs .

      - name: Build workspace
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Smoke test
        run: bash scripts/smoke-test.sh

      - name: Build UI web bundle
        run: npm run ui:build

      - name: Prepare release manifest
        run: node scripts/prepare-release-manifest.mjs

      - name: Generate local checksums
        run: node scripts/generate-release-checksums.mjs

      - name: Prepare macOS signing and notarization inputs
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "macOS signing secrets not configured; build will remain unsigned."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/kiwi-control-signing.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_INFO="$(security find-identity -v -p codesigning build.keychain | grep -E 'Developer ID Application|Apple Distribution' | head -1 || true)"
          if [ -n "$CERT_INFO" ]; then
            CERT_ID="$(echo "$CERT_INFO" | awk -F'\"' '{print $2}')"
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          fi
          if [ -n "${APPLE_API_PRIVATE_KEY:-}" ] && [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_PRIVATE_KEY" > "$APPLE_API_KEY_PATH"
            echo "APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Prepare Windows signing inputs
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_B64)) {
            Write-Host "Windows signing secrets not configured; installers will remain unsigned."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "kiwi-control-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_B64))
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $imported = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          $thumbprint = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) { $imported.Thumbprint } else { $env:WINDOWS_CERTIFICATE_THUMBPRINT }
          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) { "http://timestamp.acs.microsoft.com" } else { $env:WINDOWS_TIMESTAMP_URL }
          $overlayPath = Join-Path $env:RUNNER_TEMP "tauri.windows.signing.conf.json"
          $overlay = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = $timestampUrl
              }
            }
          } | ConvertTo-Json -Depth 10
          Set-Content -Path $overlayPath -Value $overlay
          "KIWI_CONTROL_TAURI_EXTRA_CONFIG=$overlayPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_CERTIFICATE_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build desktop bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run ui:desktop:build:release

      - name: Verify desktop release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest) node scripts/verify-release-artifacts.mjs --platform macos --bundles app,dmg ;;
            windows-latest) node scripts/verify-release-artifacts.mjs --platform windows --bundles nsis,msi ;;
            ubuntu-latest) node scripts/verify-release-artifacts.mjs --platform linux --bundles appimage ;;
          esac

      - name: Verify desktop release trust
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest) node scripts/verify-release-trust.mjs --platform macos --json --strict ;;
            windows-latest) node scripts/verify-release-trust.mjs --platform windows --json --strict ;;
            ubuntu-latest) echo "Linux trust check is not release-gated yet." ;;
          esac

      - name: Package release assets
        run: node scripts/package-release-assets.mjs

      - name: Upload packaged release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}
          path: dist/release/assets
          if-no-files-found: error

      - name: Upload canonical release manifest
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-ubuntu
          path: dist/release/release-manifest.json
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/release/downloads

      - name: Consolidate packaged assets
        run: |
          mkdir -p dist/release/publish
          shopt -s nullglob
          for dir in dist/release/downloads/release-assets-*; do
            cp -R "$dir"/. dist/release/publish/
          done
          cp dist/release/downloads/release-manifest-ubuntu/release-manifest.json dist/release/publish/release-manifest.json

      - name: Generate consolidated checksums
        run: |
          node scripts/generate-release-checksums.mjs \
            --root dist/release/publish \
            --output dist/release/publish/SHA256SUMS.txt

      - name: Write release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          cat > dist/release/release-notes.md <<EOF
          Kiwi Control ${RELEASE_TAG}

          Public beta assets are attached here. GitHub Releases remains the source of truth for downloads, and the public site points to this release stream through /releases/latest.

          Trust notes:
          - macOS signing and notarization are only trusted if this workflow ran with Apple signing and notarization secrets and the build logs confirmed those steps
          - Windows code signing is only trusted if the Windows job ran with signing secrets on a Windows runner and the build logs confirmed signing
          - auto-update metadata is still disabled until signed updater inputs are configured
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_title="Kiwi Control ${RELEASE_TAG}"
          if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${release_title}" \
              --notes-file dist/release/release-notes.md
          fi
          release_id="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json databaseId --jq '.databaseId')"
          jq -n \
            --arg name "${release_title}" \
            --rawfile body dist/release/release-notes.md \
            '{name: $name, body: $body, draft: false, prerelease: false, make_latest: "true"}' \
            > dist/release/release-update.json
          gh api \
            --method PATCH \
            --header "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            --input dist/release/release-update.json
          gh release upload "${RELEASE_TAG}" dist/release/publish/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
