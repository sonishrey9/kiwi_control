name: Release Prep

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Linux desktop prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run ui:build
      - run: node scripts/prepare-release-manifest.mjs
      - name: Upload staged CLI bundle
        uses: actions/upload-artifact@v4
        with:
          name: kiwi-control-cli-${{ matrix.os }}
          path: dist/release/cli-bundle
      - name: Upload runtime assets
        uses: actions/upload-artifact@v4
        with:
          name: kiwi-control-runtime-${{ matrix.os }}
          path: packages/sj-core/dist/runtime
      - name: Upload UI web bundle
        uses: actions/upload-artifact@v4
        with:
          name: kiwi-control-ui-web-${{ matrix.os }}
          path: apps/sj-ui/dist
      - name: Build desktop bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run ui:desktop:build
      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: kiwi-control-release-manifest-${{ matrix.os }}
          path: dist/release/release-manifest.json
      - name: Upload desktop bundles
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: kiwi-control-desktop-${{ matrix.os }}
          path: apps/sj-ui/src-tauri/target/release/bundle
