name: Release Prep

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install Linux desktop prerequisites
        if: matrix.os == 'ubuntu-latest' && vars.RELEASE_BUILD_LINUX_DESKTOP == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          if command -v rustup >/dev/null 2>&1; then
            rustup toolchain install stable --profile minimal --no-self-update
            rustup default stable
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          cargo --version
          rustc --version

      - name: Install dependencies
        run: npm ci

      - name: Remove macOS metadata junk
        run: node scripts/remove-macos-metadata.mjs .

      - name: Build workspace
        run: npm run build

      - name: Run tests
        if: matrix.os == 'ubuntu-latest'
        run: npm test

      - name: Smoke test
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/smoke-test.sh

      - name: Build UI web bundle
        run: npm run ui:build

      - name: Prepare release manifest
        run: node scripts/prepare-release-manifest.mjs

      - name: Generate local checksums
        run: node scripts/generate-release-checksums.mjs

      - name: Prepare macOS signing and notarization inputs
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "macOS signing secrets not configured; build will remain unsigned."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/kiwi-control-signing.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_INFO="$(security find-identity -v -p codesigning build.keychain | grep -E 'Developer ID Application|Apple Distribution' | head -1 || true)"
          if [ -n "$CERT_INFO" ]; then
            CERT_ID="$(echo "$CERT_INFO" | awk -F'\"' '{print $2}')"
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          fi
          if [ -n "${APPLE_API_PRIVATE_KEY:-}" ] && [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_PRIVATE_KEY" > "$APPLE_API_KEY_PATH"
            echo "APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Prepare Windows signing inputs
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_B64)) {
            Write-Host "Windows signing secrets not configured; installers will remain unsigned."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "kiwi-control-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_B64))
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $imported = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          $thumbprint = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) { $imported.Thumbprint } else { $env:WINDOWS_CERTIFICATE_THUMBPRINT }
          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) { "http://timestamp.acs.microsoft.com" } else { $env:WINDOWS_TIMESTAMP_URL }
          $overlayPath = Join-Path $env:RUNNER_TEMP "tauri.windows.signing.conf.json"
          $overlay = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = $timestampUrl
              }
            }
          } | ConvertTo-Json -Depth 10
          Set-Content -Path $overlayPath -Value $overlay
          "KIWI_CONTROL_TAURI_EXTRA_CONFIG=$overlayPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_CERTIFICATE_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build desktop bundle
        if: startsWith(github.ref, 'refs/tags/v') && (matrix.os != 'ubuntu-latest' || vars.RELEASE_BUILD_LINUX_DESKTOP == 'true')
        run: npm run ui:desktop:build:release

      - name: Verify desktop release artifacts
        if: startsWith(github.ref, 'refs/tags/v') && (matrix.os != 'ubuntu-latest' || vars.RELEASE_BUILD_LINUX_DESKTOP == 'true')
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest) node scripts/verify-release-artifacts.mjs --platform macos --bundles app,dmg,pkg ;;
            windows-latest) node scripts/verify-release-artifacts.mjs --platform windows --bundles nsis,msi ;;
            ubuntu-latest) node scripts/verify-release-artifacts.mjs --platform linux --bundles appimage ;;
          esac

      - name: Verify desktop release trust
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p dist/release
          case "${{ matrix.os }}" in
            macos-latest) node scripts/verify-release-trust.mjs --platform macos --json > dist/release/release-trust-macos.json ;;
            windows-latest) node scripts/verify-release-trust.mjs --platform windows --json > dist/release/release-trust-windows.json ;;
            ubuntu-latest) echo "Linux trust check is not release-gated yet." ;;
          esac

      - name: Verify default desktop CLI setup
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'macos-latest'
        run: |
          npm run test:installer:pkg:macos
          npm run test:installer:bundled-cli:macos
          npm run test:installer:cli-enable:macos

      - name: Verify default desktop CLI setup on Windows
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'windows-latest'
        run: |
          npm run test:installer:bundled-cli:windows
          npm run test:installer:cli-enable:windows

      - name: Upload release trust payloads
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os != 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-trust-${{ matrix.os }}
          path: dist/release/release-trust-*.json
          if-no-files-found: error

      - name: Package release assets
        env:
          KIWI_CONTROL_REQUIRE_DESKTOP_ASSET: ${{ matrix.os == 'ubuntu-latest' && vars.RELEASE_BUILD_LINUX_DESKTOP != 'true' && '0' || '1' }}
        run: node scripts/package-release-assets.mjs

      - name: Upload packaged release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-assets-${{ matrix.os }}
          path: dist/release/assets
          if-no-files-found: error

      - name: Upload canonical release manifest
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-manifest-ubuntu
          path: dist/release/release-manifest.json
          if-no-files-found: error

  publish-release-assets:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    env:
      AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      AWS_PUBLIC_BUCKET: ${{ vars.AWS_PUBLIC_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Validate required release publish inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var_name in \
            AWS_OIDC_ROLE_ARN \
            AWS_PUBLIC_BUCKET \
            AWS_REGION \
            SITE_URL; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required release publish input: ${var_name}" >&2
              missing=1
            fi
          done
          exit "${missing}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          role-session-name: kiwi-control-release-publish
          mask-aws-account-id: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist/release/downloads

      - name: Consolidate packaged assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release/publish
          shopt -s nullglob
          for dir in dist/release/downloads/release-assets-*; do
            cp -R "$dir"/. dist/release/publish/
          done
          for trust_file in dist/release/downloads/release-trust-*/release-trust-*.json; do
            cp "$trust_file" dist/release/publish/
          done
          cp dist/release/downloads/release-manifest-ubuntu/release-manifest.json dist/release/publish/release-manifest.json

      - name: Generate consolidated checksums
        run: |
          node scripts/generate-release-checksums.mjs \
            --root dist/release/publish \
            --output dist/release/publish/SHA256SUMS.txt

      - name: Write release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          cat > dist/release/release-notes.md <<EOF
          Kiwi Control ${RELEASE_TAG}

          The public Kiwi Control website and downloads host track the current release status for this beta release.

          Trust notes:
          - macOS signing and notarization are only trusted if this workflow ran with Apple signing and notarization secrets and the build logs confirmed those steps
          - Windows code signing is only trusted if the Windows job ran with signing secrets on a Windows runner and the build logs confirmed signing
          - auto-update metadata is still disabled until signed updater inputs are configured
          EOF

      - name: Create or update GitHub Release shell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          release_title="Kiwi Control ${RELEASE_TAG}"
          prerelease=false
          case "${RELEASE_TAG}" in
            *alpha*|*beta*|*rc*) prerelease=true ;;
          esac
          if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            create_args=(
              "${RELEASE_TAG}"
              --repo "${GITHUB_REPOSITORY}"
              --title "${release_title}"
              --notes-file dist/release/release-notes.md
            )
            if [ "${prerelease}" = "true" ]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}"
          fi
          jq -n \
            --arg name "${release_title}" \
            --rawfile body dist/release/release-notes.md \
            --argjson prerelease "${prerelease}" \
            '{name: $name, body: $body, draft: false, prerelease: $prerelease}' \
            > dist/release/release-update.json
          release_id="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json databaseId --jq '.databaseId')"
          gh api \
            --method PATCH \
            --header "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            --input dist/release/release-update.json

      - name: Upload release artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "${RELEASE_TAG}" dist/release/publish/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Publish AWS download surface
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/publish-aws-public-downloads.mjs \
            --publish-root dist/release/publish \
            --site-url "${SITE_URL}" \
            --bucket "${AWS_PUBLIC_BUCKET}" \
            --release-tag "${RELEASE_TAG}" \
            --macos-trust-json dist/release/publish/release-trust-macos.json \
            --windows-trust-json dist/release/publish/release-trust-windows.json \
            --require-core-artifacts \
            --require-ready

      - name: Upload release metadata to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "${RELEASE_TAG}" dist/release/publish/downloads.json \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Upload public release metadata artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-public-metadata
          path: |
            dist/release/publish/downloads.json
            dist/release/publish/SHA256SUMS.txt
            dist/release/publish/release-manifest.json
          if-no-files-found: error

  publish-production-site:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release-assets
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
      AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      AWS_PUBLIC_BUCKET: ${{ vars.AWS_PUBLIC_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      DOWNLOADS_URL: ${{ vars.DOWNLOADS_URL }}
      REPO_URL: ${{ vars.REPO_URL }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Validate required production site publish inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var_name in \
            AWS_CLOUDFRONT_DISTRIBUTION_ID \
            AWS_OIDC_ROLE_ARN \
            AWS_PUBLIC_BUCKET \
            AWS_REGION \
            REPO_URL \
            SITE_URL; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required production site publish input: ${var_name}" >&2
              missing=1
            fi
          done
          exit "${missing}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          role-session-name: kiwi-control-site-publish
          mask-aws-account-id: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-public-metadata
          path: dist/release/site-input

      - name: Stage website for AWS publish
        shell: bash
        run: |
          set -euo pipefail
          downloads_url="${DOWNLOADS_URL:-$SITE_URL}"
          node scripts/stage-pages-site.mjs \
            --downloads-json dist/release/site-input/downloads.json \
            --downloads-url "${downloads_url}" \
            --require-downloads-json \
            --repo-url "${REPO_URL}" \
            --output-dir dist/site

      - name: Verify staged site
        shell: bash
        run: |
          set -euo pipefail
          downloads_url="${DOWNLOADS_URL:-$SITE_URL}"
          node scripts/verify-public-download-surface.mjs \
            --site-dir dist/site \
            --downloads-url "${downloads_url}"

      - name: Publish website to AWS
        shell: bash
        run: |
          set -euo pipefail
          node scripts/publish-aws-public-site.mjs \
            --site-dir dist/site \
            --site-url "${SITE_URL}" \
            --bucket "${AWS_PUBLIC_BUCKET}" \
            --distribution-id "${AWS_CLOUDFRONT_DISTRIBUTION_ID}"

      - name: Verify public download surface
        shell: bash
        run: |
          set -euo pipefail
          downloads_url="${DOWNLOADS_URL:-$SITE_URL}"
          node scripts/verify-public-download-surface.mjs \
            --site-url "${SITE_URL%/}" \
            --downloads-url "${downloads_url%/}" \
            --require-ready
