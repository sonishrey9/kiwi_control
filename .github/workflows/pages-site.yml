name: Publish GitHub Pages Site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages-site.yml"
      - "website/**"
      - "docs/**"
      - "scripts/stage-pages-site.mjs"
      - "scripts/verify-public-download-surface.mjs"
      - "scripts/load-local-env.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Stage Pages site
        shell: bash
        env:
          DOWNLOADS_URL: ${{ vars.DOWNLOADS_URL }}
          REPO_URL: ${{ vars.REPO_URL }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          set -euo pipefail
          downloads_url="${DOWNLOADS_URL:-${SITE_URL:-https://kiwi-control.kiwi-ai.in}}"
          repo_url="${REPO_URL:-https://github.com/sonishrey9/kiwi-control}"
          node scripts/stage-pages-site.mjs \
            --downloads-url "${downloads_url}" \
            --repo-url "${repo_url}" \
            --output-dir dist/site

      - name: Verify staged Pages site
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-public-download-surface.mjs --site-dir dist/site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
