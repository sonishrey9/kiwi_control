name: Bootstrap Production AWS Site

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: bootstrap-production-aws
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_INFRA_OIDC_ROLE_ARN: ${{ vars.AWS_INFRA_OIDC_ROLE_ARN }}
      AWS_PUBLIC_BUCKET: ${{ vars.AWS_PUBLIC_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ROUTE53_HOSTED_ZONE_ID: ${{ vars.ROUTE53_HOSTED_ZONE_ID }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate required bootstrap inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var_name in \
            AWS_INFRA_OIDC_ROLE_ARN \
            AWS_PUBLIC_BUCKET \
            AWS_REGION \
            SITE_URL; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required AWS bootstrap input: ${var_name}" >&2
              missing=1
            fi
          done
          exit "${missing}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_INFRA_OIDC_ROLE_ARN }}
          role-session-name: kiwi-control-aws-bootstrap
          mask-aws-account-id: true

      - name: Ensure production AWS public site infrastructure
        shell: bash
        run: |
          set -euo pipefail
          node scripts/ensure-aws-public-site.mjs \
            --site-url "${SITE_URL}" \
            --bucket "${AWS_PUBLIC_BUCKET}" \
            --region "${AWS_REGION}" \
            --output dist/release/aws-public-site.json

      - name: Upload bootstrap summary
        uses: actions/upload-artifact@v4
        with:
          name: aws-public-site-summary
          path: dist/release/aws-public-site.json
          if-no-files-found: error
