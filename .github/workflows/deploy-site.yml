name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - "scripts/ensure-cloudflare-pages-project.mjs"
      - "scripts/upsert-route53-pages-record.mjs"
      - ".github/workflows/deploy-site.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
      - "package.json"

concurrency:
  group: deploy-site-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      DOWNLOADS_URL: ${{ vars.DOWNLOADS_URL }}
      REPO_URL: ${{ vars.REPO_URL }}
      ROUTE53_HOSTED_ZONE_ID: ${{ secrets.ROUTE53_HOSTED_ZONE_ID }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate required deploy inputs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          missing=0
          for var_name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_PAGES_PROJECT_NAME \
            DOWNLOADS_URL \
            REPO_URL \
            SITE_URL \
            AWS_REGION \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required deploy input: ${var_name}" >&2
              missing=1
            fi
          done
          exit "${missing}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Remove macOS metadata junk
        run: node scripts/remove-macos-metadata.mjs .

      - name: Build workspace
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Smoke test
        run: bash scripts/smoke-test.sh

      - name: Run release checks
        run: npm run release:check

      - name: Ensure Cloudflare Pages project and custom domain
        run: node scripts/ensure-cloudflare-pages-project.mjs --output dist/release/cloudflare-pages.json

      - name: UPSERT Route 53 DNS record
        run: |
          node scripts/upsert-route53-pages-record.mjs \
            --cloudflare-json dist/release/cloudflare-pages.json \
            --output dist/release/route53-upsert.json

      - name: Deploy website to Cloudflare Pages
        run: |
          npx --yes wrangler pages deploy website \
            --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" \
            --branch main \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "${GITHUB_SHA}: ${GITHUB_EVENT_NAME}"

      - name: Wait for DNS propagation and Cloudflare activation
        run: |
          site_host="$(node -e "console.log(new URL(process.env.SITE_URL).hostname)")"
          for attempt in $(seq 1 20); do
            node scripts/ensure-cloudflare-pages-project.mjs --output dist/release/cloudflare-pages.json >/dev/null
            pages_target="$(jq -r '.project.subdomain' dist/release/cloudflare-pages.json)"
            domain_status="$(jq -r '.customDomain.status' dist/release/cloudflare-pages.json)"
            if PAGES_TARGET="${pages_target}" SITE_HOST="${site_host}" node - <<'NODE'
          const dns = require("node:dns").promises;
          const expected = process.env.PAGES_TARGET.replace(/\.$/, "");
          const hostname = process.env.SITE_HOST;
          dns.resolveCname(hostname)
            .then((records) => {
              if (records.map((entry) => entry.replace(/\.$/, "")).includes(expected)) {
                process.exit(0);
              }
              process.exit(1);
            })
            .catch(() => process.exit(1));
          NODE
            then
              dns_ready=true
            else
              dns_ready=false
            fi
            if [ "${domain_status}" = "active" ] && [ "${dns_ready}" = "true" ]; then
              exit 0
            fi
            echo "Waiting for Cloudflare custom domain activation and DNS propagation (attempt ${attempt}/20): status=${domain_status} dns_ready=${dns_ready}"
            sleep 15
          done
          echo "Timed out waiting for DNS propagation or Cloudflare custom domain activation" >&2
          exit 1

      - name: Verify public site and downloads redirect
        run: |
          curl -fsSI "${SITE_URL}"
          redirect_headers="$(curl -fsSI "${SITE_URL%/}/downloads")"
          echo "${redirect_headers}"
          echo "${redirect_headers}" | grep -i "^location: ${DOWNLOADS_URL}" >/dev/null
