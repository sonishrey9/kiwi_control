name: Publish Production Site

on:
  workflow_dispatch:

concurrency:
  group: publish-production-site
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
      AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      AWS_PUBLIC_BUCKET: ${{ vars.AWS_PUBLIC_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      DOWNLOADS_URL: ${{ vars.DOWNLOADS_URL }}
      REPO_URL: ${{ vars.REPO_URL }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Validate required publish inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var_name in \
            AWS_PUBLIC_BUCKET \
            AWS_REGION \
            REPO_URL \
            SITE_URL; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required production site publish input: ${var_name}" >&2
              missing=1
            fi
          done
          if [ -z "${AWS_OIDC_ROLE_ARN:-}" ] && { [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; }; then
            echo "Missing AWS publish auth. Configure AWS_OIDC_ROLE_ARN or the existing AWS access key pair in the production environment." >&2
            missing=1
          fi
          exit "${missing}"

      - name: Configure AWS credentials via OIDC
        if: env.AWS_OIDC_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          role-session-name: kiwi-control-site-publish
          mask-aws-account-id: true

      - name: Configure AWS credentials via existing production secrets
        if: env.AWS_OIDC_ROLE_ARN == ''
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          mask-aws-account-id: true

      - name: Stage production site
        shell: bash
        run: |
          set -euo pipefail
          node scripts/stage-pages-site.mjs \
            --downloads-url "${SITE_URL}" \
            --require-downloads-json \
            --repo-url "${REPO_URL}" \
            --output-dir dist/site

      - name: Verify staged site
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-public-download-surface.mjs \
            --site-dir dist/site \
            --downloads-url "${SITE_URL}"

      - name: Publish website to AWS
        shell: bash
        run: |
          set -euo pipefail
          publish_args=(
            --site-dir dist/site
            --site-url "${SITE_URL}"
            --bucket "${AWS_PUBLIC_BUCKET}"
          )
          if [ -n "${AWS_CLOUDFRONT_DISTRIBUTION_ID:-}" ]; then
            publish_args+=(--distribution-id "${AWS_CLOUDFRONT_DISTRIBUTION_ID}")
          fi
          node scripts/publish-aws-public-site.mjs "${publish_args[@]}"

      - name: Verify public site and downloads surface
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-public-download-surface.mjs \
            --site-url "${SITE_URL%/}" \
            --downloads-url "${SITE_URL%/}"
