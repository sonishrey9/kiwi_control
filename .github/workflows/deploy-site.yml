name: Publish Production Site

on:
  workflow_dispatch:

concurrency:
  group: publish-production-site
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
      AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      AWS_PUBLIC_BUCKET: ${{ vars.AWS_PUBLIC_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      DOWNLOADS_URL: ${{ vars.DOWNLOADS_URL }}
      REPO_URL: ${{ vars.REPO_URL }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate required publish inputs
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var_name in \
            AWS_CLOUDFRONT_DISTRIBUTION_ID \
            AWS_OIDC_ROLE_ARN \
            AWS_PUBLIC_BUCKET \
            AWS_REGION \
            REPO_URL \
            SITE_URL; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required production site publish input: ${var_name}" >&2
              missing=1
            fi
          done
          exit "${missing}"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          role-session-name: kiwi-control-site-publish
          mask-aws-account-id: true

      - name: Stage production site
        shell: bash
        run: |
          set -euo pipefail
          downloads_url="${DOWNLOADS_URL:-$SITE_URL}"
          node scripts/stage-pages-site.mjs \
            --downloads-url "${downloads_url}" \
            --require-downloads-json \
            --repo-url "${REPO_URL}" \
            --output-dir dist/site

      - name: Verify staged site
        shell: bash
        run: |
          set -euo pipefail
          downloads_url="${DOWNLOADS_URL:-$SITE_URL}"
          node scripts/verify-public-download-surface.mjs \
            --site-dir dist/site \
            --downloads-url "${downloads_url}"

      - name: Publish website to AWS
        shell: bash
        run: |
          set -euo pipefail
          node scripts/publish-aws-public-site.mjs \
            --site-dir dist/site \
            --site-url "${SITE_URL}" \
            --bucket "${AWS_PUBLIC_BUCKET}" \
            --distribution-id "${AWS_CLOUDFRONT_DISTRIBUTION_ID}"

      - name: Verify public site and downloads surface
        shell: bash
        run: |
          set -euo pipefail
          downloads_url="${DOWNLOADS_URL:-$SITE_URL}"
          node scripts/verify-public-download-surface.mjs \
            --site-url "${SITE_URL%/}" \
            --downloads-url "${downloads_url%/}"
