version: 2
profile: "{{profileName}}"
checks:
  - name: config-load
    description: canonical config files parse successfully
  - name: managed-markers
    description: generated files contain valid start and end markers
  - name: portable-surfaces
    description: AGENTS.md, CLAUDE.md, and Copilot instructions route to .agent/*
  - name: secret-safety
    description: no risky files are directly ingested by shrey-junior
  - name: routing-resolution
    description: routing resolves clearly for the selected profile and task type
  - name: profile-resolution
    description: the repo profile resolves cleanly from CLI or .agent/project.yaml
  - name: packet-health
    description: run and fanout packets compile with usable instructions
  - name: context-conflicts
    description: authority files do not disagree about safety or ownership rules
  - name: workflow-awareness
    description: tool-facing repo instructions explain trivial vs non-trivial thresholds and escalation to run, fanout, dispatch, checkpoint, handoff, and push-check
  - name: continuity-readiness
    description: current phase, handoff, and reconcile artifacts are consulted before restarting non-trivial work
  - name: specialist-and-mcp-awareness
    description: specialists and MCPs are treated as policy-driven aids rather than generic freeform tools
  - name: bootstrap-profile-selection
    description: bootstrap selected a starter profile from repo authority, repo-local state, CLI, global defaults, or safe metadata without overwriting repo truth
  - name: bootstrap-global-defaults
    description: any global defaults are reference-only starter hints and never outrank existing repo authority
