version: 2
managed_by: shrey-junior
project_name: "{{projectName}}"
profile: "{{profileName}}"
bootstrap:
  project_type: "{{projectType}}"
  profile_source: "{{profileSource}}"
  specialist_suggestions: "{{starterSpecialists}}"
  validation_hints: "{{starterValidations}}"
  mcp_policy_hints: "{{starterMcpHints}}"
authority:
  canonical_repo: shrey-junior
  precedence:
    - explicit trusted repo authority
    - repo-local generated overlays and state
    - user-global accelerators
    - fallback templates and defaults
  generated_outputs_are_derived: true
  read_first:
{{firstReadOrderYaml}}
contract:
  source_of_truth:
    - explicit repo authority
    - .agent/project.yaml
    - .agent/checks.yaml
    - .agent/context/commands.md
    - .agent/context/tool-capabilities.md
    - .agent/context/mcp-capabilities.md
    - .github/copilot-instructions.md
    - .github/instructions/*.instructions.md
    - .github/agents/*.md
    - .agent/roles/*.md
  generated_state:
    - .agent/state/current-phase.json
    - .agent/state/active-role-hints.json
    - .agent/state/checkpoints/latest.json
    - .agent/state/checkpoints/latest.md
    - .agent/state/handoff/latest.json
    - .agent/state/dispatch/latest-manifest.json
    - .agent/state/dispatch/latest-collect.json
    - .agent/state/reconcile/latest.json
    - .agent/state/latest-task-packets.json
  generated_surfaces:
    core:
{{contractCoreSurfacesYaml}}
    instructions:
{{contractInstructionSurfacesYaml}}
    agent_surfaces:
{{contractAgentSurfacesYaml}}
    role_specs:
{{contractRoleSurfacesYaml}}
    state_artifacts:
{{contractStateSurfacesYaml}}
    ci_surfaces:
{{contractCiSurfacesYaml}}
    skipped_as_irrelevant:
{{contractSkippedSurfacesYaml}}
  portability:
    repo_local_contract_is_portable: true
    global_accelerators_are_advisory_only: true
    cloud_runtime_visibility_of_machine_global_files_is_not_guaranteed: true
surfaces:
  codex: AGENTS.md
  claude: CLAUDE.md
  copilot: .github/copilot-instructions.md
  copilot_instructions_dir: .github/instructions
  copilot_agents_dir: .github/agents
  specialist_roles_dir: .agent/roles
paths:
  context: .agent/context
  commands: .agent/context/commands.md
  tool_capabilities: .agent/context/tool-capabilities.md
  mcp_capabilities: .agent/context/mcp-capabilities.md
  tasks: .agent/tasks
  state: .agent/state
  active_role_hints: .agent/state/active-role-hints.json
  latest_checkpoint: .agent/state/checkpoints/latest.json
  latest_handoff: .agent/state/handoff/latest.json
  latest_dispatch: .agent/state/dispatch/latest-manifest.json
  latest_reconcile: .agent/state/reconcile/latest.json
  latest_task_packets: .agent/state/latest-task-packets.json
routing:
  preferred_execution_mode: "{{executionMode}}"
  primary_tool_override: ""
workflow:
  trivial_work:
    description: stay direct only for typo-level, wording, formatting, or one-line local fixes with no contract, auth, data, security, release, or multi-file impact
  non_trivial_triggers:
    - multi-file change
    - interface or stable contract change
    - guarded or cross-cutting refactor
    - auth, data, security, or release-sensitive work
    - reviewer or tester separation needed
  required_context_when_non_trivial:
    - existing repo authority files
    - promoted canonical docs explicitly referenced by repo authority
    - .agent/state/active-role-hints.json
    - .agent/state/current-phase.json when present
    - .agent/state/checkpoints/latest.json when present
    - latest task packet, latest handoff, latest reconcile, and latest dispatch manifest when present
    - .agent/context/commands.md, .agent/context/tool-capabilities.md, and .agent/context/mcp-capabilities.md
    - relevant .github/instructions/*.instructions.md and .agent/roles/*.md
    - .agent/checks.yaml and .agent/scripts/verify-contract.sh
    - .agent/project.yaml
  preferred_escalation:
    direct: trivial work only
    run: non-trivial single-owner work
    fanout: guarded or role-separated work
    dispatch: simultaneous small-role coordination
    continuity: checkpoint and handoff at phase boundaries
    push_gate: push-check before non-trivial or guarded push recommendations
  specialist_bias:
{{contractSpecialistsYaml}}
  verification_commands:
{{verificationCommandsYaml}}
rules:
  machine_local_state_is_reference_only: true
  global_config_changes_allowed: false
  additive_sync_only: true
  backup_before_sync: false
